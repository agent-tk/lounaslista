name: Scrape & publish lunch menus

on:
  schedule:
    # Run Mon–Fri at 07:00 Helsinki time (= 05:00 UTC, or 04:00 UTC in summer)
    # We use 04:00 UTC to cover both winter (UTC+2) and summer (UTC+3) time
    - cron: "0 4 * * 1-5"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write # needed to push index.html back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape menus and generate index.html
        run: python scrape.py

      - name: Commit and push index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: update lunch menu [skip ci]"
          git push
