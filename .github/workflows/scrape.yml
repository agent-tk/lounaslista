name: Scrape & publish lunch menus

on:
  schedule:
    # Primary: Mon–Fri at 07:00 Helsinki time (= 04:00 UTC in summer, 05:00 in winter)
    - cron: "0 4 * * 1-5"
    # Backup 1: 06:00 UTC — in case the primary run is skipped by GitHub's scheduler
    - cron: "0 6 * * 1-5"
    # Backup 2: 08:00 UTC — last-resort safety net
    - cron: "0 8 * * 1-5"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write # needed to push index.html back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape menus and generate index.html
        run: python scrape.py

      - name: Commit and push index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: update lunch menu [skip ci]"
          git push
